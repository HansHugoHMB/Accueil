}
    /* --- Hamburger Menu Button (Nouveau style) --- */
.hamburger-menu {
  background: none; /* Fond neutre */
  border: none;
  cursor: pointer;
  padding: 10px; /* Ajustez le padding selon vos besoins */
  margin-left: 15px; /* Conservez ou ajustez la marge gauche */

  display: flex;
  flex-direction: column;
  justify-content: center; /* Centre les barres verticalement dans le bouton */
  align-items: flex-start; /* Aligne les barres à gauche */

}

.mobile-header .hamburger-menu span {
  display: block !important; /* Force l'affichage */

  border-radius: 10px;
  height: 4px;
  margin-bottom: 2.5px;
  transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
}

.mobile-header .hamburger-menu span:first-child {

.mobile-header .hamburger-menu span:nth-child(2) {

}

.mobile-header .hamburger-menu span:last-child {

}

}
    /* --- The overlay that blurs content behind the menu --- */
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(5px); /* Blur behind the menu */
      background-color: rgba(0,0,0,0.2);
      z-index: 999;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }
    .menu-overlay.open {
      display: block;
      opacity: 1;
    }

    /* --- Slide-out Mobile Menu (now a smaller panel) --- */
    .mobile-menu {
      position: fixed;
      top: 10px;   /* Small gap from the top */
      left: 10px;  /* Small gap from the left */
      width: 250px;
      min-height: 80vh;
      background-color: #0D1C40; /* Same as header color */
      z-index: 1001;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
      transform: translateX(-150%) rotate(-10deg); /* Start further out and rotated */

    .mobile-menu.open {
      transform: translateX(0) rotate(0deg);

    /* Close button (×) inside the menu, top-right corner */

      display: flex;

      align-items: center;
      line-height: 0.8; /* Adjust line height for better centering */
    }
    .close-menu-btn:hover {
      background-color: rgba(255, 255, 255, 0.2);
      color: #ccc;
    }

    /* Tabs List */
    .tabs-list {
      list-style: none;
      margin: 0;

      display: flex;

      margin: 0;

    .tab-link {
      text-decoration: none;

      padding: 10px 0;
      display: block;

    }
    .tab-link.active {

    /* --- Iframe Content --- */

      position: fixed;

      border: none;
      z-index: 1;

    /* --- Security Overlay --- */
    #securityOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1002;
    }
    .security-box {
      background: #0D1C40;
      padding: 20px;
      border-radius: 8px;
      width: 80%;
      max-width: 300px;
      text-align: center;
      color: white;
      border: 3px solid yellow;
      outline: 3px solid red;
      animation: rotateYellow 2s linear infinite, rotateRed 2s linear infinite;
    }
    .security-input {
      width: calc(100% - 24px);
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1em;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 2px;
    }
    #securityError {
      color: blue;
      display: none;
      font-size: 0.9em;
    }
    #matriculeVerification {
      display: none; /* Initially hidden */
    }
    .recaptcha-container {
      display: flex;
      justify-content: center;
    }

    /* --- CAPTCHA Slider Styles --- */
    .captcha-wrapper {
        position: absolute; /* Changed to absolute to be contained within security-box */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
    }

    .captcha-container {
        width: 280px; /* Adjusted width to fit inside security-box */
        background: white;
        padding: 15px;
        border: 2px solid #0D1C40;
        border-radius: 15px;
        position: relative;
    }

    .slider-container {
        height: 3mm;
        position: relative;
        overflow: visible;
        border-radius: 10px;
        background-color: #f0f0f0;
    }

    .progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0;
        background-color: #0D1C40; /* Changed to yellow for better visibility */
        border-radius: 10px 0 0 10px;
        pointer-events: none;
    }

    .slider {
        width: calc(100% + 20px); /* Ajustement pour le curseur */
        height: 100%;
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        outline: none;
        margin: 0;
        margin-left: -10px; /* Compensation pour le curseur */
        cursor: pointer;
        position: relative;
        z-index: 2;
    }

    /* Style du curseur pour Chrome/Safari */
    .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        background: #0D1C40;
        border-radius: 50%;
        cursor: pointer;
        margin-top: -8.5px; /* (hauteur du curseur - hauteur de la barre) / 2 */
        position: relative;
        z-index: 3;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    /* Style du curseur pour Firefox */
    .slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        background: #0D1C40;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
        z-index: 3;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    .slider::-moz-range-track {
        background: transparent;
        border: none;
    }

    /* Pour masquer la piste par défaut */
    .slider::-webkit-slider-runnable-track {
        background: transparent;
        border: none;
        height: 3mm;
    }

    .blur-background {
        /* Removed blur for the overlay */
        display: none; /* Hide the standalone blur background */
    }

    .fade-out {
        opacity: 0;
        transition: opacity 0.5s ease;
    }

  <div class="menu-overlay" id="menuOverlay"></div>

  <div class="mobile-menu" id="mobileMenu">

    <ul class="tabs-list">
      <li class="tab-item"><a href="https://prepa.pages.dev" class="tab-link active">Accueil</a></li>
      <li class="tab-item"><a href="https://prepa.pages.dev/stats" class="tab-link">Statistiques</a></li>

  <script>
    const mobileMenu   = document.getElementById('mobileMenu');
    const contentFrame = document.getElementById('contentFrame');
    const menuOverlay  = document.getElementById('menuOverlay');
    const menuLinks    = mobileMenu.querySelectorAll('.tab-link');

    function toggleMobileMenu() {
      mobileMenu.classList.toggle('open');
      menuOverlay.classList.toggle('open');
      // Optionally blur the iframe:
      // contentFrame.classList.toggle('menu-open');
    }

    // Close menu by clicking overlay
    menuOverlay.addEventListener('click', toggleMobileMenu);

    // Load initial content in iframe
    contentFrame.src = mobileMenu.querySelector('.tab-link.active').href;

    // Handle clicks in the mobile menu
    menuLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        // Update active tab
        menuLinks.forEach(l => l.classList.remove('active'));
        this.classList.add('active');
        // Load content in iframe
        contentFrame.src = this.href;
        // Close the menu
        toggleMobileMenu();
      });
    });
  </script>

  <div id="securityOverlay">
    <div class="security-box">
      <h2>VÉRIFICATION</h2>
      <div class="captcha-wrapper">
        <div class="captcha-container">
            <div class="slider-container">
                <div class="progress-bar"></div>
                <input type="range" class="slider" value="0" min="0" max="100" step="1">
            </div>
        </div>
      </div>
      <div id="matriculeVerification" style="display: none;">
        <p style="font-size: 0.9em;">Les six premiers chiffres de votre matricule :</p>
        <input type="text"
               id="securityAnswer"
               class="security-input"
               placeholder="XX/XXXX"
               maxlength="7"
               pattern="[A-Z0-9/]+"
               required>
        <p id="securityError">Réponse incorrect !!</p>
      </div>
    </div>
  </div>

  <script>
    // Security check
    const EXPECTED_ANSWER = "24/0000";
    const securityOverlay = document.getElementById('securityOverlay');
    const matriculeVerificationDiv = document.getElementById('matriculeVerification');

    // Slider CAPTCHA elements
    const slider = document.querySelector('#securityOverlay .slider');
    const progressBar = document.querySelector('#securityOverlay .progress-bar');
    const captchaWrapper = document.querySelector('#securityOverlay .captcha-wrapper');
    // const blurBackground = document.querySelector('.blur-background'); // No longer needed

    function updateProgress(value) {
        requestAnimationFrame(() => {
            progressBar.style.width = `${value}%`;
        });
    }

    function validateCaptcha() {
        setTimeout(() => {
            captchaWrapper.classList.add('fade-out');
            // blurBackground.classList.add('fade-out'); // No longer needed

            setTimeout(() => {
                captchaWrapper.style.display = 'none'; // Hide the slider
                matriculeVerificationDiv.style.display = 'block'; // Show matricule input
            }, 500);
        }, 200);
    }

    if (slider && progressBar && captchaWrapper) {
        slider.addEventListener('input', (e) => {
            updateProgress(e.target.value);
            if (parseInt(e.target.value) === 100) {
                validateCaptcha();
            }
        });

        slider.addEventListener('touchmove', () => {
            updateProgress(slider.value);
            if (parseInt(slider.value) === 100) {
                validateCaptcha();
            }
        });

        updateProgress(0);
    }

    function verifySecurity() {
      const userInput = document.getElementById('securityAnswer').value.toUpperCase();
      const errorElement = document.getElementById('securityError');

      if(userInput === EXPECTED_ANSWER) {
        securityOverlay.style.display = 'none';
      } else {
        errorElement.style.display = 'block';
        document.getElementById('securityAnswer').value = '';
        setTimeout(() => errorElement.style.display = 'none', 2000);
      }
    }

    // Auto-format + verify for matricule input
    document.getElementById('securityAnswer').addEventListener('input', function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9/]/g, '');
      // Auto-add slash after 2 chars
      if(this.value.length === 2 && !this.value.includes('/')) {
        this.value += '/';
      }
      // If length is reached, verify
      if (this.value.length === 7) {
        verifySecurity();
      }
    });
  </script>
